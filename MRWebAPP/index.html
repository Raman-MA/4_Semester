<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-page">

    <div class="dashboard-body">

        <!-- LEFT: full height sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="images/svendborgpng.png" alt="logo" class="sidebar-logo-img">
            </div>
            <div class="sidebar-buttons">
                <button class="sidebar-btn active">Oversigt</button>
                <button class="sidebar-btn">Opret</button>
                <button class="sidebar-btn">Forecast</button>
            </div>
        </aside>

        <!-- RIGHT: nav on top, content below -->
        <div class="right-panel">
            <nav class="top-nav">
                <ul class="nav-links">
                    <li><a href="#" class="active">Home</a></li>
                    <li><a href="#">Kontakt</a></li>
                    <li><a href="#">Om os</a></li>
                </ul>
            </nav>
            <main class="main-content"></main>
        </div>

    </div>

    <script src="script.ts"></script>
</body>
</html>
