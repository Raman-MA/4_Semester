<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log ind</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
    <div class="login-header">
        <div class="login-logo">
            <img src="images\svendborgpng.png" alt="logo" class="logo-img">
        </div>
        <h1 class="login-title">Velkommen</h1>
    </div>
    <div class="login-card"> 
        <div class="form-group">
            <label for="bruger">Brugernavn</label>
            <input type="text" id="bruger" name="bruger" placeholder="Indtast brugernavn">
        </div>
        <div class="form-group">
            <label for="password">Kodeord</label>
            <input type="password" id="password" name="password" placeholder="Indtast Adgangskode">
        </div>

            <button class="login-btn" type="submit">Log ind</button>

        <div class="login-links">
            <a href="#">Glemt kodeord?</a>
            <a href="#">Opret konto</a>
        </div>
    </div>
</body>
</html>
