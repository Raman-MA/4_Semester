<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette — #E8FFE5</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --base: #E8FFE5;
    --text-dark: #2E4A30;
    --font-display: 'DM Serif Display', serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: #f4f7f4;
    font-family: var(--font-mono);
    min-height: 100vh;
    padding: 48px 32px 80px;
    color: var(--text-dark);
  }

  header {
    max-width: 960px;
    margin: 0 auto 56px;
    display: flex;
    align-items: flex-end;
    gap: 28px;
  }

  .base-swatch {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: #E8FFE5;
    border: 2px solid rgba(46,74,48,0.12);
    flex-shrink: 0;
    box-shadow: 0 8px 32px rgba(46,74,48,0.10);
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  header h1 { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.1; color: var(--text-dark); }
  header h1 span { font-style: italic; color: #4CAF50; }
  header p { font-size: 0.78rem; letter-spacing: 0.08em; color: #7a9b7c; margin-top: 6px; text-transform: uppercase; }

  .tabs {
    max-width: 960px;
    margin: 0 auto 32px;
    display: flex;
    gap: 8px;
  }

  .tab {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 999px;
    border: 1.5px solid rgba(46,74,48,0.2);
    background: transparent;
    color: #7a9b7c;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tab:hover { background: rgba(46,74,48,0.06); }
  .tab.active { background: #2E4A30; color: #E8FFE5; border-color: #2E4A30; }

  .panel { display: none; max-width: 960px; margin: 0 auto; }
  .panel.active { display: block; }

  .section-label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: #7a9b7c; margin: 32px 0 10px; padding-left: 2px; }

  .row { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }

  .swatch {
    border-radius: 16px;
    overflow: hidden;
    border: 1.5px solid rgba(0,0,0,0.06);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .swatch:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 16px 40px rgba(0,0,0,0.12); }
  .swatch:hover .copy-hint { opacity: 1; }

  .color-block { height: 100px; width: 100%; position: relative; }

  .copy-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em;
    opacity: 0; transition: opacity 0.2s ease;
    backdrop-filter: blur(2px); background: rgba(255,255,255,0.2);
  }

  .swatch-info { background: white; padding: 12px 14px; }
  .swatch-name { font-family: var(--font-display); font-size: 0.95rem; color: #2b3b2c; margin-bottom: 3px; }
  .swatch-hex { font-size: 0.72rem; letter-spacing: 0.1em; color: #8aaa8c; }
  .swatch-role { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: #b5cfb6; margin-top: 4px; }

  .usage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  .usage-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    border: 1.5px solid rgba(0,0,0,0.06);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .usage-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.09); }

  .usage-header { padding: 18px 20px 14px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 12px; }
  .usage-dot { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.07); }
  .usage-title { font-family: var(--font-display); font-size: 1.05rem; color: #2b3b2c; }
  .usage-hex { font-size: 0.68rem; letter-spacing: 0.1em; color: #8aaa8c; margin-top: 2px; }
  .usage-body { padding: 16px 20px; }
  .usage-desc { font-size: 0.75rem; line-height: 1.7; color: #5a7a5c; margin-bottom: 14px; }
  .usage-preview { display: flex; flex-direction: column; gap: 8px; }

  .btn-demo {
    display: inline-block; padding: 10px 22px; border-radius: 8px;
    font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.08em;
    border: none; cursor: pointer; transition: filter 0.15s ease; text-align: center;
  }
  .btn-demo:hover { filter: brightness(0.9); }

  .btn-outline {
    display: inline-block; padding: 9px 20px; border-radius: 8px;
    font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.08em;
    border: 2px solid; cursor: pointer; background: transparent;
    transition: all 0.15s ease; text-align: center;
  }

  .input-demo {
    width: 100%; padding: 9px 14px; border-radius: 8px;
    font-family: var(--font-mono); font-size: 0.75rem; outline: none;
  }

  .badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 0.68rem; letter-spacing: 0.08em; font-family: var(--font-mono); }

  .card-demo { border-radius: 10px; padding: 14px; font-size: 0.75rem; line-height: 1.6; }

  .nav-demo { border-radius: 10px; padding: 10px 14px; display: flex; gap: 16px; align-items: center; font-size: 0.72rem; letter-spacing: 0.05em; }
  .nav-item-d { opacity: 0.45; }
  .nav-item-d.on { opacity: 1; }

  .label-sm { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .divider-line { height: 1px; width: 100%; border-radius: 999px; margin: 6px 0; }

  .preview-strip {
    max-width: 960px; margin: 40px auto 0;
    border-radius: 20px; overflow: hidden;
    display: grid; grid-template-columns: repeat(9, 1fr);
    height: 44px; border: 1.5px solid rgba(0,0,0,0.06);
  }

  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2E4A30; color: #E8FFE5;
    font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em;
    padding: 10px 22px; border-radius: 999px;
    opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="base-swatch"></div>
  <div>
    <h1>Your <span>Palette</span></h1>
    <p>Based on #E8FFE5 · Click swatches to copy</p>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('colors', this)">All Colors</button>
  <button class="tab" onclick="switchTab('usage', this)">UI Usage Guide</button>
</div>

<div class="panel active" id="panel-colors">
  <div class="section-label">Base Color</div>
  <div class="row" id="base-row"></div>
  <div class="section-label">Direct Complement</div>
  <div class="row" id="complement-row"></div>
  <div class="section-label">Analogous</div>
  <div class="row" id="analogous-row"></div>
  <div class="section-label">Triadic</div>
  <div class="row" id="triadic-row"></div>
  <div class="section-label">Accents & Neutrals</div>
  <div class="row" id="accents-row"></div>
  <div class="preview-strip" id="strip"></div>
</div>

<div class="panel" id="panel-usage">
  <div class="usage-grid" id="usage-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const palette = {
  base: [{ hex: '#E8FFE5', name: 'Mint Mist', role: 'Your base' }],
  complement: [{ hex: '#FFE8EB', name: 'Blush Petal', role: 'Warm contrast' }],
  analogous: [
    { hex: '#E5F0FF', name: 'Sky Haze', role: 'Analogous cool' },
    { hex: '#F0FFE5', name: 'Lime Whisper', role: 'Analogous warm' },
    { hex: '#E5FFF8', name: 'Aqua Bloom', role: 'Analogous teal' }
  ],
  triadic: [
    { hex: '#E5E8FF', name: 'Lavender Mist', role: 'Triadic' },
    { hex: '#FFE5E8', name: 'Rose Petal', role: 'Triadic' }
  ],
  accents: [
    { hex: '#4CAF50', name: 'Leaf Green', role: 'Pop accent' },
    { hex: '#2E7D32', name: 'Forest', role: 'Deep accent' },
    { hex: '#A5D6A7', name: 'Sage', role: 'Mid-tone' },
    { hex: '#F9F9F6', name: 'Off-White', role: 'Background' },
    { hex: '#2E4A30', name: 'Moss Dark', role: 'Text' }
  ]
};

const usageItems = [
  {
    hex: '#4CAF50', name: 'Leaf Green', title: 'Primary Button',
    desc: 'Main CTAs — "Sign Up", "Buy Now", "Submit". Strong enough to demand attention without clashing with your mint base.',
    preview: `<button class="btn-demo" style="background:#4CAF50;color:white;">Get Started →</button>`
  },
  {
    hex: '#2E7D32', name: 'Forest', title: 'Button Hover State',
    desc: 'The hovered or pressed state for primary buttons. Darker shade creates a clear depth effect for interaction.',
    preview: `<button class="btn-demo" style="background:#2E7D32;color:white;">Get Started →</button>
              <div style="font-size:0.65rem;color:#8aaa8c;margin-top:4px;letter-spacing:0.08em;">↑ On hover</div>`
  },
  {
    hex: '#E8FFE5', name: 'Mint Mist', title: 'Secondary Button',
    desc: 'Subtle secondary actions like "Learn More" or "Cancel". Keeps visual hierarchy clear alongside your primary.',
    preview: `<button class="btn-outline" style="border-color:#4CAF50;color:#2E7D32;">Learn More</button>`
  },
  {
    hex: '#2E4A30', name: 'Moss Dark', title: 'Body Text',
    desc: 'All paragraph text, labels, and general content. High contrast on mint and white — warmer and more on-brand than pure black.',
    preview: `<p style="color:#2E4A30;font-size:0.8rem;line-height:1.7;">The quick brown fox jumps over the lazy dog. Clean, readable, and on-brand.</p>`
  },
  {
    hex: '#F9F9F6', name: 'Off-White', title: 'Page Background',
    desc: 'Main site background. Warmer than pure white — lets your mint and green accents pop naturally without harshness.',
    preview: `<div class="card-demo" style="background:#F9F9F6;border:1px solid rgba(0,0,0,0.07);color:#2E4A30;">Page background — soft, not stark.</div>`
  },
  {
    hex: '#E8FFE5', name: 'Mint Mist', title: 'Card / Section Background',
    desc: 'Feature sections, pricing cards, or highlighted content zones. A gentle tint that differentiates areas from the white background.',
    preview: `<div class="card-demo" style="background:#E8FFE5;border:1px solid rgba(46,74,48,0.1);color:#2E4A30;">Featured plan or callout section.</div>`
  },
  {
    hex: '#A5D6A7', name: 'Sage', title: 'Input Border (Default)',
    desc: 'Default border color for text inputs, selects, and textareas. Soft enough not to distract, clear enough to guide.',
    preview: `<div class="label-sm" style="color:#7a9b7c;">Email address</div>
              <input class="input-demo" style="border:2px solid #A5D6A7;background:white;color:#2E4A30;" placeholder="you@example.com" />`
  },
  {
    hex: '#4CAF50', name: 'Leaf Green', title: 'Input Focus Ring',
    desc: 'The active/focused border for inputs. Vivid green immediately signals which field is selected.',
    preview: `<div class="label-sm" style="color:#7a9b7c;">Email address</div>
              <input class="input-demo" style="border:2px solid #4CAF50;background:white;color:#2E4A30;box-shadow:0 0 0 3px rgba(76,175,80,0.15);" value="you@example.com" />`
  },
  {
    hex: '#E8FFE5', name: 'Mint Mist', title: 'Success Badge',
    desc: 'Status tags like "Active", "Verified", or "Success". Pairs with forest green text for a cohesive success signal.',
    preview: `<span class="badge" style="background:#E8FFE5;color:#2E7D32;border:1px solid #A5D6A7;">✓ Verified</span>
              &nbsp;
              <span class="badge" style="background:#E8FFE5;color:#2E7D32;border:1px solid #A5D6A7;">Active</span>`
  },
  {
    hex: '#FFE8EB', name: 'Blush Petal', title: 'Error / Danger Badge',
    desc: 'Error states, warnings, or destructive actions. Your palette\'s complement — visually distinct yet still harmonious.',
    preview: `<span class="badge" style="background:#FFE8EB;color:#c0404a;border:1px solid #f5b8be;">✕ Failed</span>
              &nbsp;
              <span class="badge" style="background:#FFE8EB;color:#c0404a;border:1px solid #f5b8be;">Expired</span>`
  },
  {
    hex: '#2E4A30', name: 'Moss Dark', title: 'Navigation / Header',
    desc: 'Top navbars, sidebars, or footers. Dark and grounded — anchors the page while keeping the green theme consistent.',
    preview: `<div class="nav-demo" style="background:#2E4A30;color:#E8FFE5;">
                <span style="font-weight:bold;letter-spacing:0.1em;">LOGO</span>
                <span class="nav-item-d on">Home</span>
                <span class="nav-item-d">About</span>
                <span class="nav-item-d">Contact</span>
              </div>`
  },
  {
    hex: '#A5D6A7', name: 'Sage', title: 'Dividers / Separators',
    desc: 'Horizontal rules, section dividers, table borders. Separates content cleanly without creating visual noise.',
    preview: `<p style="color:#2E4A30;font-size:0.75rem;">Section one</p>
              <div class="divider-line" style="background:#A5D6A7;opacity:0.6;"></div>
              <p style="color:#2E4A30;font-size:0.75rem;">Section two</p>`
  }
];

function textColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b)/255 > 0.55 ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.6)';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function makeSwatch(color) {
  const el = document.createElement('div');
  el.className = 'swatch';
  el.innerHTML = `
    <div class="color-block" style="background:${color.hex}">
      <div class="copy-hint" style="color:${textColor(color.hex)}">COPY HEX</div>
    </div>
    <div class="swatch-info">
      <div class="swatch-name">${color.name}</div>
      <div class="swatch-hex">${color.hex}</div>
      <div class="swatch-role">${color.role}</div>
    </div>`;
  el.addEventListener('click', () => {
    navigator.clipboard.writeText(color.hex).catch(() => {});
    showToast(`${color.hex} copied!`);
  });
  return el;
}

Object.entries(palette).forEach(([key, colors]) => {
  const row = document.getElementById(`${key}-row`);
  if (row) colors.forEach(c => row.appendChild(makeSwatch(c)));
});

const strip = document.getElementById('strip');
Object.values(palette).flat().forEach(c => {
  const b = document.createElement('div');
  b.style.background = c.hex;
  strip.appendChild(b);
});

const grid = document.getElementById('usage-grid');
usageItems.forEach(item => {
  const card = document.createElement('div');
  card.className = 'usage-card';
  card.innerHTML = `
    <div class="usage-header">
      <div class="usage-dot" style="background:${item.hex}"></div>
      <div>
        <div class="usage-title">${item.title}</div>
        <div class="usage-hex">${item.hex} · ${item.name}</div>
      </div>
    </div>
    <div class="usage-body">
      <p class="usage-desc">${item.desc}</p>
      <div class="usage-preview">${item.preview}</div>
    </div>`;
  grid.appendChild(card);
});

function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
